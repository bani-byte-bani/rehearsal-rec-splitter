<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Silence Splitter — 無音区間分解プレイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Shippori+Mincho:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f5f3ef;
    --bg-soft: #ebe8e1;
    --ink: #1c1a17;
    --ink-soft: #6b6760;
    --line: #d8d3c8;
    --accent: #b5482f;
    --accent-soft: #e8d8d0;
    --silence: #c9c4b8;
    --silence-line: #a39d8e;
    --radius: 2px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    min-height: 100vh;
    display:flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header{
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1{
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.15;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .sub{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ---------- Main ---------- */
  main{
    flex: 1;
    padding: 22px 20px 100px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- Drop zone ---------- */
  .dropzone{
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg-soft);
    display: block;
  }
  .dropzone.drag{
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone .icon{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .dropzone .label{
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .dropzone .hint{
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  input[type=file]{ display:none; }

  /* ---------- File info ---------- */
  .file-info{
    display:none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .file-info.show{ display:block; }
  .file-info b{ color: var(--ink); font-weight: 500; }

  /* ---------- Progress ---------- */
  .progress-wrap{
    display:none;
    margin-top: 22px;
  }
  .progress-wrap.show{ display:block; }
  .progress-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
    display:flex;
    justify-content: space-between;
  }
  .progress-track{
    height: 2px;
    background: var(--line);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .progress-fill{
    position:absolute;
    top:0; left:0; height:100%;
    width:0%;
    background: var(--accent);
    transition: width .15s ease;
  }

  /* ---------- Result section ---------- */
  .result{
    display:none;
    margin-top: 30px;
  }
  .result.show{ display:block; }

  .result-summary{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    line-height: 1.8;
  }
  .result-summary .num{
    color: var(--accent);
    font-weight: 500;
  }

  /* ---------- Waveform ---------- */
  .waveform-wrap{
    position: relative;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 4px;
  }
  canvas#waveform{
    display:block;
    width: 100%;
    height: 120px;
    cursor: pointer;
  }
  .playhead{
    position:absolute;
    top:0; bottom:0;
    width: 1px;
    background: var(--ink);
    pointer-events: none;
    display:none;
  }

  .time-axis{
    display:flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    padding: 4px 2px 0;
    margin-bottom: 22px;
  }

  /* ---------- Section list ---------- */
  .section-list{
    display:flex;
    flex-direction: column;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .seg{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    cursor: pointer;
    transition: background .15s ease;
  }
  .seg:hover{ background: var(--bg-soft); }
  .seg.playing{ background: var(--accent-soft); }
  .seg.silence{
    background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #efece5 6px, #efece5 12px
    );
    cursor: default;
  }
  .seg.silence:hover{ background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #efece5 6px, #efece5 12px
    ); }

  .seg-index{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    width: 24px;
    flex-shrink: 0;
  }

  .seg-play{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 12px;
    color: var(--ink);
  }
  .seg.silence .seg-play{
    visibility: hidden;
  }
  .seg.playing .seg-play{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .seg-body{
    flex: 1;
    min-width: 0;
  }
  .seg-title{
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .seg.silence .seg-title{
    color: var(--ink-soft);
    font-style: italic;
  }
  .seg-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .seg-duration{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }

  /* ---------- Sticky transport ---------- */
  .transport{
    display:none;
    position: fixed;
    left:0; right:0; bottom:0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: var(--bg);

<body>

<header>
  <div class="eyebrow">Practice Tape Analysis</div>
  <h1>Silence Splitter</h1>
  <div class="sub">長尺の練習音源から、演奏していない無音区間（5分以上）を検出して分解します。</div>
</header>

<main>

  <label class="dropzone" id="dropzone" for="fileInput">
    <div class="icon">Step 01 — Upload</div>
    <div class="label">MP3ファイルを選択</div>
    <div class="hint">タップしてファイルを選ぶ、またはドラッグ＆ドロップ</div>
    <input type="file" id="fileInput" accept="audio/*,.mp3">
  </label>

  <div class="file-info" id="fileInfo"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">解析中…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="result" id="result">
    <div class="result-summary" id="resultSummary"></div>

    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="playhead" id="playhead"></div>
    </div>
    <div class="time-axis" id="timeAxis"></div>

    <div class="section-list" id="sectionList"></div>
  </div>

</main>

<div class="transport" id="transport">
  <div class="transport-btn" id="transportBtn">▶</div>
  <div class="transport-info">
    <div class="transport-title" id="transportTitle">—</div>
    <div class="transport-time" id="transportTime">00:00 / 00:00</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ---------- Constants (hardcoded per current spec) ----------
  const SILENCE_RATIO = 0.05;       // 全体最大RMSに対する5%以下を無音候補とみなす
  const MIN_SILENCE_SEC = 5 * 60;   // 5分以上連続したら無音区間として確定
  const ANALYSIS_INTERVAL_SEC = 0.2; // RMS解析の時間刻み

  // ---------- DOM refs ----------
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressPct = document.getElementById('progressPct');
  const progressLabel = document.getElementById('progressLabel');
  const result = document.getElementById('result');
  const resultSummary = document.getElementById('resultSummary');
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const playhead = document.getElementById('playhead');
  const timeAxis = document.getElementById('timeAxis');
  const sectionList = document.getElementById('sectionList');
  const transport = document.getElementById('transport');
  const transportBtn = document.getElementById('transportBtn');
  const transportTitle = document.getElementById('transportTitle');
  const transportTime = document.getElementById('transportTime');

  // ---------- State ----------
  let audioCtx = null;
  let audioBuffer = null;
  let sourceNode = null;
  let isPlaying = false;
  let currentSegment = null; // {start, end, index}
  let segments = []; // [{type:'play'|'silence', start, end}]
  let playStartCtxTime = 0;
  let playOffsetInSegment = 0;
  let rafId = null;
  let waveformPeaks = null; // downsampled peaks for drawing

  // ---------- Helpers ----------
  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function fmtBytes(bytes){
    if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function setProgress(pct, label){
    progressFill.style.width = pct + '%';
    progressPct.textContent = Math.round(pct) + '%';
    if(label) progressLabel.textContent = label;
  }

  // ---------- File handling ----------
  // dropzone is a <label for="fileInput">, so tapping it natively opens the
  // file chooser without needing JS. Only drag&drop is wired up here.
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if(f) handleFile(f);
  });
  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if(f) handleFile(f);
  });

  async function handleFile(file){
    resetUI();
    fileInfo.innerHTML = '<b>' + escapeHtml(file.name) + '</b> — ' + fmtBytes(file.size);
    fileInfo.classList.add('show');
    progressWrap.classList.add('show');
    setProgress(2, 'ファイル読み込み中…');

    try{
      const arrayBuffer = await file.arrayBuffer();
      setProgress(15, 'デコード中…');

      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      setProgress(40, '音量解析中…');

      // Yield to UI before heavy analysis
      await sleep(30);
      const rms = computeRMS(audioBuffer, ANALYSIS_INTERVAL_SEC, (p) => {
        setProgress(40 + p*40, '音量解析中…');
      });

      setProgress(85, '無音区間を判定中…');
      await sleep(20);
      segments = detectSegments(rms, ANALYSIS_INTERVAL_SEC, audioBuffer.duration);

      setProgress(95, '波形を描画中…');
      await sleep(20);
      waveformPeaks = computePeaks(audioBuffer, 600);

      setProgress(100, '完了');
      await sleep(150);
      progressWrap.classList.remove('show');

      renderResult();
    }catch(err){
      console.error(err);
      progressWrap.classList.remove('show');
      fileInfo.innerHTML += '<br><span style="color:var(--accent)">解析に失敗しました: ' + escapeHtml(err.message || String(err)) + '</span>';
    }
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function resetUI(){
    result.classList.remove('show');
    transport.classList.remove('show');
    stopPlayback();
    segments = [];
    audioBuffer = null;
    waveformPeaks = null;
  }

  // ---------- RMS computation ----------
  function computeRMS(buffer, intervalSec, onProgress){
    const sampleRate = buffer.sampleRate;
    const channelCount = buffer.numberOfChannels;
    const frameSize = Math.max(1, Math.floor(intervalSec * sampleRate));
    const totalFrames = buffer.length;
    const numWindows = Math.ceil(totalFrames / frameSize);
    const rms = new Float32Array(numWindows);

    // mix down channels into one Float32Array reference list
    const channels = [];
    for(let c=0; c<channelCount; c++){
      channels.push(buffer.getChannelData(c));
    }

    for(let w=0; w<numWindows; w++){
      const start = w * frameSize;
      const end = Math.min(start + frameSize, totalFrames);
      let sumSq = 0;
      let count = 0;
      for(let c=0; c<channelCount; c++){
        const data = channels[c];
        for(let i=start; i<end; i++){
          const v = data[i];
          sumSq += v*v;
          count++;
        }
      }
      rms[w] = count > 0 ? Math.sqrt(sumSq / count) : 0;
      if(onProgress && (w % 200 === 0)){
        onProgress(w / numWindows);
      }
    }
    if(onProgress) onProgress(1);
    return rms; // Float32Array, one value per intervalSec window
  }

  // ---------- Segment detection ----------
  function detectSegments(rms, intervalSec, totalDuration){
    let maxRms = 0;
    for(let i=0;i<rms.length;i++){ if(rms[i] > maxRms) maxRms = rms[i]; }
    const threshold = maxRms * SILENCE_RATIO;
    const minSilenceWindows = Math.ceil(MIN_SILENCE_SEC / intervalSec);

    // build raw boolean silence array
    const isSilent = new Uint8Array(rms.length);
    for(let i=0;i<rms.length;i++){
      isSilent[i] = rms[i] <= threshold ? 1 : 0;
    }

    // find runs
    const segs = [];
    let i = 0;
    while(i < isSilent.length){
      const startI = i;
      const val = isSilent[i];
      while(i < isSilent.length && isSilent[i] === val) i++;
      const endI = i; // exclusive
      const lengthWindows = endI - startI;
      const isLongSilence = (val === 1) && (lengthWindows >= minSilenceWindows);
      segs.push({
        type: isLongSilence ? 'silence' : 'play',
        startI, endI
      });
    }

    // merge adjacent 'play' runs that resulted from short silences being reclassified as play
    const merged = [];
    for(const s of segs){
      if(merged.length && merged[merged.length-1].type === s.type){
        merged[merged.length-1].endI = s.endI;
      } else {
        merged.push({...s});
      }
    }

    // convert to time, clip to duration
    const result = merged.map(s => ({
      type: s.type,
      start: Math.min(s.startI * intervalSec, totalDuration),
      end: Math.min(s.endI * intervalSec, totalDuration)
    })).filter(s => s.end - s.start > 0.05);

    return result;
  }

  // ---------- Waveform peaks ----------
  function computePeaks(buffer, numBuckets){
    const data = buffer.getChannelData(0);
    const len = data.length;
    const bucketSize = Math.floor(len / numBuckets) || 1;
    const peaks = new Float32Array(numBuckets);
    for(let b=0; b<numBuckets; b++){
      const start = b * bucketSize;
      const end = Math.min(start + bucketSize, len);
      let max = 0;
      for(let i=start; i<end; i++){
        const v = Math.abs(data[i]);
        if(v > max) max = v;
      }
      peaks[b] = max;
    }
    return peaks;
  }

  function drawWaveform(){
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = rect.width || canvas.parentElement.clientWidth;
    const h = 120;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h);

    const duration = audioBuffer.duration;
    const mid = h/2;

    // draw silence background bands first
    const styles = getComputedStyle(document.documentElement);
    const silenceColor = '#e3dfd3';
    ctx.fillStyle = silenceColor;
    segments.filter(s=>s.type==='silence').forEach(s=>{
      const x1 = (s.start/duration) * w;
      const x2 = (s.end/duration) * w;
      ctx.fillRect(x1, 0, Math.max(1, x2-x1), h);
    });

    // draw waveform peaks
    const peaks = waveformPeaks;
    const n = peaks.length;
    ctx.fillStyle = '#1c1a17';
    const barW = w / n;
    for(let i=0;i<n;i++){
      const amp = peaks[i];
      const barH = Math.max(1, amp * (h*0.85));
      const x = i * barW;
      ctx.fillRect(x, mid - barH/2, Math.max(1, barW*0.7), barH);
    }

    // boundary lines between segments
    ctx.strokeStyle = '#a39d8e';
    ctx.lineWidth = 1;
    segments.forEach(s=>{
      const x = (s.start/duration) * w;
      ctx.beginPath();
      ctx.moveTo(x+0.5,0);
      ctx.lineTo(x+0.5,h);
      ctx.stroke();
    });
  }
