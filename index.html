<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>rehearsal-rec-splitter — 無音区間分解プレイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Shippori+Mincho:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #141416;
    --bg-soft: #1e1e22;
    --ink: #e8e4dc;
    --ink-soft: #7a7870;
    --line: #2e2e34;
    --accent: #c9a96e;
    --accent-soft: #2a2318;
    --silence: #232328;
    --silence-line: #3a3a42;
    --radius: 2px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    min-height: 100vh;
    display:flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header{
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1{
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.15;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  .sub{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .build-info{
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.03em;
    color: var(--line);
  }

  /* ---------- Main ---------- */
  main{
    flex: 1;
    padding: 22px 20px 100px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- Drop zone ---------- */
  .dropzone{
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg-soft);
  }
  .dropzone.drag{
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone .icon{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .dropzone .label{
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .dropzone .hint{
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  input[type=file]{ display:none; }

  /* ---------- File info ---------- */
  .file-info{
    display:none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .file-info.show{ display:block; }
  .file-info b{ color: var(--ink); font-weight: 500; }

  /* ---------- Settings panel ---------- */
  .settings-panel{
    display: none;
    margin-top: 20px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .settings-panel.show{ display: block; }

  .settings-title{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-soft);
  }

  .setting-row{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }
  .setting-row:last-child{ border-bottom: none; }

  .setting-label{
    font-size: 13px;
    color: var(--ink);
    flex-shrink: 0;
    width: 120px;
  }
  .setting-label span{
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  .setting-slider-wrap{
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type=range]{
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 2px;
    background: var(--line);
    border-radius: 1px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }
  input[type=range]::-moz-range-thumb{
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .setting-value{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    width: 56px;
    text-align: right;
    flex-shrink: 0;
  }

  .reanalyze-btn{
    display: none;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity .15s ease;
    margin-top: 14px;
    border-radius: var(--radius);
  }
  .reanalyze-btn.show{ display: block; }
  .reanalyze-btn:active{ opacity: 0.7; }

  /* ---------- Progress ---------- */
  .progress-wrap{
    display:none;
    margin-top: 22px;
  }
  .progress-wrap.show{ display:block; }
  .progress-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
    display:flex;
    justify-content: space-between;
  }
  .progress-track{
    height: 2px;
    background: var(--line);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .progress-fill{
    position:absolute;
    top:0; left:0; height:100%;
    width:0%;
    background: var(--accent);
    transition: width .15s ease;
  }

  /* ---------- Result section ---------- */
  .result{
    display:none;
    margin-top: 30px;
  }
  .result.show{ display:block; }

  .result-summary{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    line-height: 1.8;
  }
  .result-summary .num{
    color: var(--accent);
    font-weight: 500;
  }

  /* ---------- Split controls ---------- */
  .split-controls{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .split-mode-btn{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 7px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: var(--bg-soft);
    color: var(--ink-soft);
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  .split-mode-btn.active{
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
  }
  .split-hint{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    text-align: right;
    flex: 1;
  }

  /* ---------- Waveform ---------- */
  .waveform-wrap{
    position: relative;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 4px;
  }
  canvas#waveform{
    display:block;
    width: 100%;
    height: 120px;
    cursor: pointer;
  }
  canvas#waveform.split-mode{
    cursor: crosshair;
  }
  .playhead{
    position:absolute;
    top:0; bottom:0;
    width: 1px;
    background: var(--ink);
    pointer-events: none;
    display:none;
  }

  .time-axis{
    display:flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    padding: 4px 2px 0;
    margin-bottom: 22px;
  }

  /* ---------- Section list ---------- */
  .section-list{
    display:flex;
    flex-direction: column;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .seg{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    cursor: pointer;
    transition: background .15s ease;
  }
  .seg:hover{ background: var(--bg-soft); }
  .seg.playing{ background: var(--accent-soft); }
  .seg.silence{
    background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #1e1e24 6px, #1e1e24 12px
    );
    cursor: default;
  }
  .seg.silence:hover{ background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #1e1e24 6px, #1e1e24 12px
    ); }

  .seg-index{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    width: 24px;
    flex-shrink: 0;
  }

  .seg-play{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg-soft);
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 12px;
    color: var(--ink);
  }
  .seg.silence .seg-play{
    visibility: hidden;
  }
  .seg.playing .seg-play{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .seg-body{
    flex: 1;
    min-width: 0;
  }
  .seg-title{
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .seg.silence .seg-title{
    color: var(--ink-soft);
    font-style: italic;
  }
  .seg-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .seg-duration{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }

  /* ---------- Sticky transport ---------- */
  .transport{
    display:none;
    position: fixed;
    left:0; right:0; bottom:0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--line);
    align-items:center;
    gap: 14px;
  }
  .transport.show{ display:flex; }
  .transport-btn{
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
  }
  .transport-info{
    flex:1;
    min-width:0;
  }
  .transport-title{
    font-size: 13px;
    color: var(--ink);
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .transport-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  /* ---------- Misc ---------- */
  .status-msg{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    text-align:center;
    padding: 30px 0;
  }

  ::selection{ background: var(--accent-soft); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Practice Tape Analysis</div>
  <h1>rehearsal-rec-splitter</h1>
  <div class="sub">長尺の練習音源から、演奏していない無音区間（1分以上）を検出して分解します。</div>
  <div class="build-info" id="buildInfo"></div>
</header>

<main>

  <label class="dropzone" id="dropzone">
    <div class="icon">Step 01 — Upload</div>
    <div class="label">MP3ファイルを選択</div>
    <div class="hint">タップしてファイルを選ぶ、またはドラッグ＆ドロップ</div>
    <input type="file" id="fileInput" accept="audio/*,.mp3">
  </label>

  <div class="file-info" id="fileInfo"></div>

  <!-- Settings panel: visible after first analysis -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">Step 02 — Detection Settings</div>

    <div class="setting-row">
      <div class="setting-label">
        無音判定時間
        <span>この秒数以上続いたら無音区間</span>
      </div>
      <div class="setting-slider-wrap">
        <input type="range" id="silenceDurSlider" min="10" max="600" step="10" value="60">
        <div class="setting-value" id="silenceDurVal">60秒</div>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        無音判定閾値
        <span>この音量以下を無音候補とする</span>
      </div>
      <div class="setting-slider-wrap">
        <input type="range" id="silenceDbSlider" min="-60" max="-10" step="1" value="-30">
        <div class="setting-value" id="silenceDbVal">-30 dB</div>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label">
        最小演奏時間
        <span>これより短い演奏区間は無視</span>
      </div>
      <div class="setting-slider-wrap">
        <input type="range" id="minPlaySlider" min="0" max="3" step="1" value="3">
        <div class="setting-value" id="minPlayVal">3秒</div>
      </div>
    </div>
  </div>

  <button class="reanalyze-btn" id="reanalyzeBtn">▶ この設定で再判定</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">解析中…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="result" id="result">
    <div class="result-summary" id="resultSummary"></div>

    <div class="split-controls">
      <button class="split-mode-btn" id="splitModeBtn">✂️ 分割モード: OFF</button>
      <div class="split-hint" id="splitHint">波形をタップして再生</div>
    </div>

    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="playhead" id="playhead"></div>
    </div>
    <div class="time-axis" id="timeAxis"></div>

    <div class="section-list" id="sectionList"></div>
  </div>

</main>

<div class="transport" id="transport">
  <div class="transport-btn" id="transportBtn">▶</div>
  <div class="transport-info">
    <div class="transport-title" id="transportTitle">—</div>
    <div class="transport-time" id="transportTime">00:00 / 00:00</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ---------- Analysis interval (fixed) ----------
  const ANALYSIS_INTERVAL_SEC = 0.2; // RMS解析の時間刻み

  // ---------- Debug: build timestamp (Claudeがファイルを編集するたびに手動更新) ----------
  const BUILD_TIMESTAMP = '2026-07-08 (波形クリック分割機能・最小演奏時間0-3秒化)';

  // ---------- DOM refs ----------
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const buildInfo = document.getElementById('buildInfo');
  const settingsPanel = document.getElementById('settingsPanel');
  const silenceDurSlider = document.getElementById('silenceDurSlider');
  const silenceDurVal = document.getElementById('silenceDurVal');
  const silenceDbSlider = document.getElementById('silenceDbSlider');
  const silenceDbVal = document.getElementById('silenceDbVal');
  const minPlaySlider = document.getElementById('minPlaySlider');
  const minPlayVal = document.getElementById('minPlayVal');
  const reanalyzeBtn = document.getElementById('reanalyzeBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressPct = document.getElementById('progressPct');
  const progressLabel = document.getElementById('progressLabel');
  const result = document.getElementById('result');
  const resultSummary = document.getElementById('resultSummary');
  const splitModeBtn = document.getElementById('splitModeBtn');
  const splitHint = document.getElementById('splitHint');
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const playhead = document.getElementById('playhead');
  const timeAxis = document.getElementById('timeAxis');
  const sectionList = document.getElementById('sectionList');
  const transport = document.getElementById('transport');
  const transportBtn = document.getElementById('transportBtn');
  const transportTitle = document.getElementById('transportTitle');
  const transportTime = document.getElementById('transportTime');

  // ---------- State ----------
  let audioCtx = null;
  let audioBuffer = null;
  let cachedRms = null;  // RMS解析結果をキャッシュ（設定変更時に再利用）
  let sourceNode = null;
  let isPlaying = false;
  let currentSegment = null; // {start, end, index}
  let rawSegments = [];  // detectSegments()の生の結果（手動分割なし）
  let segments = []; // [{type:'play'|'silence', start, end}] 手動分割適用後の最終結果
  let manualSplits = []; // ユーザーが波形タップで追加した分割時刻（秒）のリスト
  let splitModeActive = false;
  let playStartCtxTime = 0;
  let playOffsetInSegment = 0;
  let rafId = null;
  let waveformPeaks = null; // downsampled peaks for drawing

  // ---------- Helpers ----------
  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function fmtBytes(bytes){
    if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function setProgress(pct, label){
    progressFill.style.width = pct + '%';
    progressPct.textContent = Math.round(pct) + '%';
    if(label) progressLabel.textContent = label;
  }

  // ---------- Settings helpers ----------
  function getSilenceSec(){
    return parseInt(silenceDurSlider.value, 10);
  }
  function getSilenceDb(){
    return parseInt(silenceDbSlider.value, 10);
  }
  function getMinPlaySec(){
    return parseInt(minPlaySlider.value, 10);
  }
  // dB → RMS linear (0dBFS = RMS 1.0 の世界で)
  function dbToRms(db){
    return Math.pow(10, db / 20);
  }

  function updateSliderLabels(){
    const sec = getSilenceSec();
    silenceDurVal.textContent = sec >= 60
      ? (sec / 60).toFixed(sec % 60 === 0 ? 0 : 1) + '分'
      : sec + '秒';
    silenceDbVal.textContent = getSilenceDb() + ' dB';
    minPlayVal.textContent = getMinPlaySec() + '秒';
  }

  silenceDurSlider.addEventListener('input', () => {
    updateSliderLabels();
    reanalyzeBtn.classList.add('show');
  });
  silenceDbSlider.addEventListener('input', () => {
    updateSliderLabels();
    reanalyzeBtn.classList.add('show');
  });
  minPlaySlider.addEventListener('input', () => {
    updateSliderLabels();
    reanalyzeBtn.classList.add('show');
  });

  reanalyzeBtn.addEventListener('click', () => {
    if(!cachedRms || !audioBuffer) return;
    reanalyzeBtn.classList.remove('show');
    stopPlayback();
    rawSegments = detectSegments(cachedRms, ANALYSIS_INTERVAL_SEC, audioBuffer.duration);
    segments = applyManualSplits(rawSegments, audioBuffer.duration);
    renderResult();
  });

  updateSliderLabels();
  buildInfo.textContent = 'build: ' + BUILD_TIMESTAMP;

  // ---------- File handling ----------
  // dropzone is a <label for="fileInput">, so tapping it natively opens the
  // file chooser without needing JS. Only drag&drop is wired up here.
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if(f) handleFile(f);
  });
  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if(f) handleFile(f);
  });

  async function handleFile(file){
    resetUI();
    fileInfo.innerHTML = '<b>' + escapeHtml(file.name) + '</b> — ' + fmtBytes(file.size);
    fileInfo.classList.add('show');
    progressWrap.classList.add('show');
    setProgress(2, 'ファイル読み込み中…');

    try{
      const arrayBuffer = await file.arrayBuffer();
      setProgress(15, 'デコード中…');

      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === 'suspended'){
        await audioCtx.resume();
      }
      audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      setProgress(40, '音量解析中…');

      // Yield to UI before heavy analysis
      await sleep(30);
      cachedRms = computeRMS(audioBuffer, ANALYSIS_INTERVAL_SEC, (p) => {
        setProgress(40 + p*40, '音量解析中…');
      });

      setProgress(85, '無音区間を判定中…');
      await sleep(20);
      rawSegments = detectSegments(cachedRms, ANALYSIS_INTERVAL_SEC, audioBuffer.duration);
      segments = applyManualSplits(rawSegments, audioBuffer.duration);

      setProgress(95, '波形を描画中…');
      await sleep(20);
      waveformPeaks = computePeaks(audioBuffer, 600);

      setProgress(100, '完了');
      await sleep(150);
      progressWrap.classList.remove('show');

      // 設定パネルを表示
      settingsPanel.classList.add('show');
      reanalyzeBtn.classList.remove('show');

      renderResult();
    }catch(err){
      console.error(err);
      progressWrap.classList.remove('show');
      fileInfo.innerHTML += '<br><span style="color:var(--accent)">解析に失敗しました: ' + escapeHtml(err.message || String(err)) + '</span>';
    }
  }

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function resetUI(){
    result.classList.remove('show');
    transport.classList.remove('show');
    settingsPanel.classList.remove('show');
    reanalyzeBtn.classList.remove('show');
    stopPlayback();
    segments = [];
    rawSegments = [];
    manualSplits = [];
    splitModeActive = false;
    splitModeBtn.classList.remove('active');
    splitModeBtn.textContent = '✂️ 分割モード: OFF';
    canvas.classList.remove('split-mode');
    splitHint.textContent = '波形をタップして再生';
    audioBuffer = null;
    cachedRms = null;
    waveformPeaks = null;
  }

  // ---------- RMS computation ----------
  function computeRMS(buffer, intervalSec, onProgress){
    const sampleRate = buffer.sampleRate;
    const channelCount = buffer.numberOfChannels;
    const frameSize = Math.max(1, Math.floor(intervalSec * sampleRate));
    const totalFrames = buffer.length;
    const numWindows = Math.ceil(totalFrames / frameSize);
    const rms = new Float32Array(numWindows);

    // mix down channels into one Float32Array reference list
    const channels = [];
    for(let c=0; c<channelCount; c++){
      channels.push(buffer.getChannelData(c));
    }

    for(let w=0; w<numWindows; w++){
      const start = w * frameSize;
      const end = Math.min(start + frameSize, totalFrames);
      let sumSq = 0;
      let count = 0;
      for(let c=0; c<channelCount; c++){
        const data = channels[c];
        for(let i=start; i<end; i++){
          const v = data[i];
          sumSq += v*v;
          count++;
        }
      }
      rms[w] = count > 0 ? Math.sqrt(sumSq / count) : 0;
      if(onProgress && (w % 200 === 0)){
        onProgress(w / numWindows);
      }
    }
    if(onProgress) onProgress(1);
    return rms; // Float32Array, one value per intervalSec window
  }

  // ---------- Segment detection ----------
  function detectSegments(rms, intervalSec, totalDuration){
    // スライダーから現在の設定値を取得
    const minSilenceSec = getSilenceSec();
    const thresholdRms = dbToRms(getSilenceDb());
    const minSilenceWindows = Math.ceil(minSilenceSec / intervalSec);

    // build raw boolean silence array
    const isSilent = new Uint8Array(rms.length);
    for(let i=0;i<rms.length;i++){
      isSilent[i] = rms[i] <= thresholdRms ? 1 : 0;
    }

    // find runs
    const segs = [];
    let i = 0;
    while(i < isSilent.length){
      const startI = i;
      const val = isSilent[i];
      while(i < isSilent.length && isSilent[i] === val) i++;
      const endI = i; // exclusive
      const lengthWindows = endI - startI;
      const isLongSilence = (val === 1) && (lengthWindows >= minSilenceWindows);
      segs.push({
        type: isLongSilence ? 'silence' : 'play',
        startI, endI
      });
    }

    // merge adjacent 'play' runs that resulted from short silences being reclassified as play
    const merged = [];
    for(const s of segs){
      if(merged.length && merged[merged.length-1].type === s.type){
        merged[merged.length-1].endI = s.endI;
      } else {
        merged.push({...s});
      }
    }

    // 最小演奏時間未満の 'play' 区間は 'silence' として扱う（ノイズ的な短い演奏の誤検出を除去）
    const minPlaySec = getMinPlaySec();
    const minPlayWindows = Math.ceil(minPlaySec / intervalSec);
    for(const s of merged){
      if(s.type === 'play' && (s.endI - s.startI) < minPlayWindows){
        s.type = 'silence';
      }
    }

    // 上記の型変更で隣接同士が同種になった区間を再マージ
    const remerged = [];
    for(const s of merged){
      if(remerged.length && remerged[remerged.length-1].type === s.type){
        remerged[remerged.length-1].endI = s.endI;
      } else {
        remerged.push({...s});
      }
    }

    // convert to time, clip to duration
    const result = remerged.map(s => ({
      type: s.type,
      start: Math.min(s.startI * intervalSec, totalDuration),
      end: Math.min(s.endI * intervalSec, totalDuration)
    })).filter(s => s.end - s.start > 0.05);

    return result;
  }

  // ---------- Manual splits ----------
  // manualSplits（秒のリスト）を使って、rawSegmentsの該当区間を手動で分割する。
  // 分割してできた両側は元と同じ type（play/silence）を引き継ぐ。
  function applyManualSplits(segs, totalDuration){
    if(!manualSplits.length) return segs;
    const sorted = [...manualSplits].sort((a,b) => a-b);
    const result = [];
    for(const seg of segs){
      const cuts = sorted.filter(t => t > seg.start + 0.05 && t < seg.end - 0.05);
      if(cuts.length === 0){
        result.push(seg);
        continue;
      }
      let prevStart = seg.start;
      for(const c of cuts){
        result.push({ type: seg.type, start: prevStart, end: c });
        prevStart = c;
      }
      result.push({ type: seg.type, start: prevStart, end: seg.end });
    }
    return result;
  }

  // ---------- Waveform peaks ----------
  function computePeaks(buffer, numBuckets){
    const data = buffer.getChannelData(0);
    const len = data.length;
    const bucketSize = Math.floor(len / numBuckets) || 1;
    const peaks = new Float32Array(numBuckets);
    for(let b=0; b<numBuckets; b++){
      const start = b * bucketSize;
      const end = Math.min(start + bucketSize, len);
      let max = 0;
      for(let i=start; i<end; i++){
        const v = Math.abs(data[i]);
        if(v > max) max = v;
      }
      peaks[b] = max;
    }
    return peaks;
  }

  // ---------- Rendering ----------
  function renderResult(){
    result.classList.add('show');

    const playSegs = segments.filter(s => s.type === 'play');
    const silenceSegs = segments.filter(s => s.type === 'silence');
    const totalSilence = silenceSegs.reduce((a,s) => a + (s.end-s.start), 0);

    resultSummary.innerHTML =
      '全長 <span class="num">' + fmtTime(audioBuffer.duration) + '</span>　|　' +
      '演奏区間 <span class="num">' + playSegs.length + '</span>　|　' +
      '無音区間 <span class="num">' + silenceSegs.length + '</span>' +
      (silenceSegs.length ? '（計 ' + fmtTime(totalSilence) + '）' : '');

    drawWaveform();
    drawTimeAxis();
    drawSectionList();
  }

  function drawWaveform(){
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = rect.width || canvas.parentElement.clientWidth;
    const h = 120;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,w,h);

    const duration = audioBuffer.duration;
    const mid = h/2;

    // draw silence background bands first
    const styles = getComputedStyle(document.documentElement);
    const silenceColor = '#1e1e24';
    ctx.fillStyle = silenceColor;
    segments.filter(s=>s.type==='silence').forEach(s=>{
      const x1 = (s.start/duration) * w;
      const x2 = (s.end/duration) * w;
      ctx.fillRect(x1, 0, Math.max(1, x2-x1), h);
    });

    // draw waveform peaks
    const peaks = waveformPeaks;
    const n = peaks.length;
    ctx.fillStyle = '#c9a96e';
    const barW = w / n;
    for(let i=0;i<n;i++){
      const amp = peaks[i];
      const barH = Math.max(1, amp * (h*0.85));
      const x = i * barW;
      ctx.fillRect(x, mid - barH/2, Math.max(1, barW*0.7), barH);
    }

    // boundary lines between segments
    ctx.strokeStyle = '#3a3a42';
    ctx.lineWidth = 1;
    segments.forEach(s=>{
      const x = (s.start/duration) * w;
      ctx.beginPath();
      ctx.moveTo(x+0.5,0);
      ctx.lineTo(x+0.5,h);
      ctx.stroke();
    });

    // manual split lines (ユーザーが追加した分割点。目立つアクセントカラーで描画)
    ctx.strokeStyle = '#c9a96e';
    ctx.lineWidth = 2;
    manualSplits.forEach(t=>{
      const x = (t/duration) * w;
      ctx.beginPath();
      ctx.moveTo(x,0);
      ctx.lineTo(x,h);
      ctx.stroke();
    });
  }

  function drawTimeAxis(){
    const duration = audioBuffer.duration;
    const marks = 5;
    let html = '';
    for(let i=0;i<=marks;i++){
      html += '<span>' + fmtTime(duration * i/marks) + '</span>';
    }
    timeAxis.innerHTML = html;
  }

  function drawSectionList(){
    sectionList.innerHTML = '';
    let playIndex = 0;
    segments.forEach((s, idx) => {
      const div = document.createElement('div');
      div.className = 'seg' + (s.type === 'silence' ? ' silence' : '');
      div.dataset.idx = idx;

      let titleText, indexText;
      if(s.type === 'play'){
        playIndex++;
        indexText = String(playIndex).padStart(2,'0');
        titleText = '演奏区間 ' + playIndex;
      } else {
        indexText = '—';
        titleText = '無音（演奏なし）';
      }

      div.innerHTML =
        '<div class="seg-index">' + indexText + '</div>' +
        '<div class="seg-play">▶</div>' +
        '<div class="seg-body">' +
          '<div class="seg-title">' + titleText + '</div>' +
          '<div class="seg-time">' + fmtTime(s.start) + ' – ' + fmtTime(s.end) + '</div>' +
        '</div>' +
        '<div class="seg-duration">' + fmtTime(s.end - s.start) + '</div>';

      if(s.type === 'play'){
        div.addEventListener('click', () => playSegment(s, idx, titleText));
      }
      sectionList.appendChild(div);
    });
  }

  // ---------- Playback ----------
  function stopPlayback(){
    if(sourceNode){
      try{ sourceNode.onended = null; sourceNode.stop(); }catch(e){}
      sourceNode = null;
    }
    isPlaying = false;
    if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    playhead.style.display = 'none';
    document.querySelectorAll('.seg.playing').forEach(el => el.classList.remove('playing'));
    transportBtn.textContent = '▶';
  }

  function playSegment(seg, idx, title){
    if(!audioBuffer) return;
    stopPlayback();

    currentSegment = {start: seg.start, end: seg.end, idx};
    sourceNode = audioCtx.createBufferSource();
    sourceNode.buffer = audioBuffer;
    sourceNode.connect(audioCtx.destination);

    const dur = seg.end - seg.start;
    sourceNode.start(0, seg.start, dur);
    playStartCtxTime = audioCtx.currentTime;
    isPlaying = true;

    sourceNode.onended = () => {
      if(isPlaying){
        stopPlayback();
      }
    };

    document.querySelectorAll('.seg').forEach(el => el.classList.remove('playing'));
    const el = sectionList.querySelector('[data-idx="' + idx + '"]');
    if(el) el.classList.add('playing');

    transport.classList.add('show');
    transportTitle.textContent = title;
    transportBtn.textContent = '⏸';
    playhead.style.display = 'block';

    updatePlayhead();
  }

  function updatePlayhead(){
    if(!isPlaying || !currentSegment){ return; }
    const elapsed = audioCtx.currentTime - playStartCtxTime;
    const segDur = currentSegment.end - currentSegment.start;
    const curTimeInSeg = Math.min(elapsed, segDur);
    const curTimeAbs = currentSegment.start + curTimeInSeg;

    const duration = audioBuffer.duration;
    const w = canvas.getBoundingClientRect().width;
    const x = (curTimeAbs / duration) * w;
    playhead.style.left = x + 'px';

    transportTime.textContent = fmtTime(curTimeInSeg) + ' / ' + fmtTime(segDur);

    if(elapsed >= segDur){
      stopPlayback();
      return;
    }
    rafId = requestAnimationFrame(updatePlayhead);
  }

  transportBtn.addEventListener('click', () => {
    if(isPlaying){
      stopPlayback();
    } else if(currentSegment){
      const seg = segments[currentSegment.idx];
      const title = transportTitle.textContent;
      playSegment(seg, currentSegment.idx, title);
    }
  });

  // ---------- Split mode toggle ----------
  splitModeBtn.addEventListener('click', () => {
    splitModeActive = !splitModeActive;
    splitModeBtn.classList.toggle('active', splitModeActive);
    splitModeBtn.textContent = splitModeActive ? '✂️ 分割モード: ON' : '✂️ 分割モード: OFF';
    canvas.classList.toggle('split-mode', splitModeActive);
    splitHint.textContent = splitModeActive
      ? 'タップで分割点を追加／分割点をタップで削除'
      : '波形をタップして再生';
  });

  // click on waveform: 通常時は再生、分割モード時は分割点の追加・削除
  canvas.addEventListener('click', (e) => {
    if(!audioBuffer) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const ratio = x / rect.width;
    const t = ratio * audioBuffer.duration;

    if(splitModeActive){
      const pxPerSec = rect.width / audioBuffer.duration;
      const hitIdx = manualSplits.findIndex(s => Math.abs(s - t) * pxPerSec < 8);
      if(hitIdx >= 0){
        manualSplits.splice(hitIdx, 1);
      } else {
        manualSplits.push(t);
      }
      segments = applyManualSplits(rawSegments, audioBuffer.duration);
      stopPlayback();
      renderResult();
      return;
    }

    const seg = segments.find(s => t >= s.start && t < s.end);
    if(seg && seg.type === 'play'){
      const idx = segments.indexOf(seg);
      playSegment(seg, idx, '演奏区間（波形タップ）');
    }
  });

  window.addEventListener('resize', () => {
    if(audioBuffer && waveformPeaks){
      drawWaveform();
    }
  });

})();
</script>
</body>
</html>
