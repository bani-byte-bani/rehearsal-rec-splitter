<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Silence Splitter — 無音区間分解プレイヤー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Shippori+Mincho:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #f5f3ef;
    --bg-soft: #ebe8e1;
    --ink: #1c1a17;
    --ink-soft: #6b6760;
    --line: #d8d3c8;
    --accent: #b5482f;
    --accent-soft: #e8d8d0;
    --silence: #c9c4b8;
    --silence-line: #a39d8e;
    --radius: 2px;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    -webkit-tap-highlight-color: transparent;
  }

  body{
    min-height: 100vh;
    display:flex;
    flex-direction: column;
  }

  /* ---------- Header ---------- */
  header{
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .title-wrap{
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 0 0 6px;
  }

  h1{
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.15;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .version-tag{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--bg);
    background: var(--ink-soft);
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .sub{
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  /* ---------- Main ---------- */
  main{
    flex: 1;
    padding: 22px 20px 100px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }

  /* ---------- Drop zone ---------- */
  .dropzone{
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s ease, background .2s ease;
    background: var(--bg-soft);
    display: block;
  }
  .dropzone.drag{
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .dropzone .icon{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .dropzone .label{
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink);
  }
  .dropzone .hint{
    margin-top: 8px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  input[type=file]{ display:none; }

  /* ---------- File info ---------- */
  .file-info{
    display:none;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .file-info.show{ display:block; }
  .file-info b{ color: var(--ink); font-weight: 500; }

  /* ---------- Progress ---------- */
  .progress-wrap{
    display:none;
    margin-top: 22px;
  }
  .progress-wrap.show{ display:block; }
  .progress-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
    display:flex;
    justify-content: space-between;
  }
  .progress-track{
    height: 2px;
    background: var(--line);
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  .progress-fill{
    position:absolute;
    top:0; left:0; height:100%;
    width:0%;
    background: var(--accent);
    transition: width .15s ease;
  }

  /* ---------- Result section ---------- */
  .result{
    display:none;
    margin-top: 30px;
  }
  .result.show{ display:block; }

  .result-summary{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 18px;
    line-height: 1.8;
  }
  .result-summary .num{
    color: var(--accent);
    font-weight: 500;
  }

  /* ---------- Waveform ---------- */
  .waveform-wrap{
    position: relative;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 4px;
  }
  canvas#waveform{
    display:block;
    width: 100%;
    height: 120px;
    cursor: pointer;
  }
  .playhead{
    position:absolute;
    top:0; bottom:0;
    width: 1px;
    background: var(--ink);
    pointer-events: none;
    display:none;
  }

  .time-axis{
    display:flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-soft);
    padding: 4px 2px 0;
    margin-bottom: 22px;
  }

  /* ---------- Section list ---------- */
  .section-list{
    display:flex;
    flex-direction: column;
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .seg{
    display:flex;
    align-items:center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    cursor: pointer;
    transition: background .15s ease;
  }
  .seg:hover{ background: var(--bg-soft); }
  .seg.playing{ background: var(--accent-soft); }
  .seg.silence{
    background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #efece5 6px, #efece5 12px
    );
    cursor: default;
  }
  .seg.silence:hover{ background: repeating-linear-gradient(
      135deg,
      var(--bg) 0px, var(--bg) 6px,
      #efece5 6px, #efece5 12px
    ); }

  .seg-index{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    width: 24px;
    flex-shrink: 0;
  }

  .seg-play{
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    flex-shrink: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 12px;
    color: var(--ink);
  }
  .seg.silence .seg-play{
    visibility: hidden;
  }
  .seg.playing .seg-play{
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .seg-body{
    flex: 1;
    min-width: 0;
  }
  .seg-title{
    font-size: 14px;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .seg.silence .seg-title{
    color: var(--ink-soft);
    font-style: italic;
  }
  .seg-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .seg-duration{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    flex-shrink: 0;
  }

  /* ---------- Sticky transport ---------- */
  .transport{
    display:none;
    position: fixed;
    left:0; right:0; bottom:0;
    padding: 14px 20px calc(14px + env(safe-area-inset-bottom));
    background: var(--bg);
    border-top: 1px solid var(--line);
    align-items:center;
    gap: 14px;
    z-index: 100;
  }
  .transport.show{ display:flex; }
  .transport-btn{
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--bg);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 16px;
    cursor: pointer;
  }
  .transport-info{
    flex:1;
    min-width:0;
  }
  .transport-title{
    font-size: 13px;
    color: var(--ink);
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .transport-time{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }

  ::selection{ background: var(--accent-soft); }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Practice Tape Analysis</div>
  <div class="title-wrap">
    <h1>Silence Splitter</h1>
    <span class="version-tag" id="versionTag">v1.0.0</span>
  </div>
  <div class="sub">長尺の練習音源から、演奏していない無音区間（5分以上）を検出して分解します。</div>
</header>

<main>

  <label class="dropzone" id="dropzone" for="fileInput">
    <div class="icon">Step 01 — Upload</div>
    <div class="label">MP3ファイルを選択</div>
    <div class="hint">タップしてファイルを選ぶ、またはドラッグ＆ドロップ</div>
    <input type="file" id="fileInput" accept="audio/*,.mp3">
  </label>

  <div class="file-info" id="fileInfo"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressLabel">準備中…</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="result" id="result">
    <div class="result-summary" id="resultSummary"></div>

    <div class="waveform-wrap">
      <canvas id="waveform"></canvas>
      <div class="playhead" id="playhead"></div>
    </div>
    <div class="time-axis" id="timeAxis"></div>

    <div class="section-list" id="sectionList"></div>
  </div>

</main>

<div class="transport" id="transport">
  <div class="transport-btn" id="transportBtn">▶</div>
  <div class="transport-info">
    <div class="transport-title" id="transportTitle">—</div>
    <div class="transport-time" id="transportTime">00:00 / 00:00</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ---------- Debug Version ----------
  const VERSION = "v1.1.0-stream"; // 画面同期用のバージョン番号
  
  // ---------- Constants ----------
  const SILENCE_RATIO = 0.05;       // 最大音量に対する5%以下を無音候補とする
  const MIN_SILENCE_SEC = 5 * 60;   // 5分以上連続したら無音区間
  const SAMPLING_INTERVAL = 0.5;   // サンプリング間隔（秒）。ストリーミング解析用の最適なステップ

  // ---------- DOM refs ----------
  const versionTag = document.getElementById('versionTag');
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressPct = document.getElementById('progressPct');
  const progressLabel = document.getElementById('progressLabel');
  const result = document.getElementById('result');
  const resultSummary = document.getElementById('resultSummary');
  const canvas = document.getElementById('waveform');
  const ctx = canvas.getContext('2d');
  const playhead = document.getElementById('playhead');
  const timeAxis = document.getElementById('timeAxis');
  const sectionList = document.getElementById('sectionList');
  const transport = document.getElementById('transport');
  const transportBtn = document.getElementById('transportBtn');
  const transportTitle = document.getElementById('transportTitle');
  const transportTime = document.getElementById('transportTime');

  // ---------- Audio & State ----------
  let audioHtmlElement = null; // メモリ節約用のHTML5 Audio要素
  let audioCtx = null;
  let audioSource = null;
  let analyserNode = null;
  
  let isPlaying = false;
  let segments = [];
  let currentSegmentIndex = -1;
  let duration = 0;
  let rmsData = []; // 解析されたRMS配列
  let waveformPeaks = []; // 描画用のピークデータ
  let playTimerId = null;

  // バージョン表記の初期化
  if (versionTag) versionTag.textContent = VERSION;

  // ---------- Helpers ----------
  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function fmtBytes(bytes){
    if(bytes < 1024*1024) return (bytes/1024).toFixed(0) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function setProgress(pct, label){
    progressFill.style.width = pct + '%';
    progressPct.textContent = Math.round(pct) + '%';
    if(label) progressLabel.textContent = label;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Event Listeners ----------
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if(f) handleFile(f);
  });
  fileInput.addEventListener('change', e => {
    const f = e.target.files[0];
    if(f) handleFile(f);
  });

  // ---------- Core File Processing ----------
  async function handleFile(file){
    resetUI();

    // Android Chrome対策：非同期処理に入る前に、ユーザーの直接タップの文脈で即座にUI表示＆AudioContextの初期化を行う
    fileInfo.innerHTML = '<b>' + escapeHtml(file.name) + '</b> — ' + fmtBytes(file.size);
    fileInfo.classList.add('show');
    progressWrap.classList.add('show');
    setProgress(1, 'ファイルを読み込み中…');

    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      await audioCtx.resume();
    }

    // 描画更新の猶予をブラウザに与える
    await new Promise(r => requestAnimationFrame(r));

    try {
      const fileUrl = URL.createObjectURL(file);
      audioHtmlElement = new Audio();
      audioHtmlElement.src = fileUrl;
      audioHtmlElement.preload = 'auto';

      // メタデータの読み込み完了（総再生時間の取得）を待つ
      await new Promise((resolve, reject) => {
        audioHtmlElement.onloadedmetadata = resolve;
        audioHtmlElement.onerror = () => reject(new Error("オーディオファイルの読み込みに失敗しました。"));
      });

      duration = audioHtmlElement.duration;
      if (!duration || duration === Infinity) {
        throw new Error("再生時間を取得できませんでした。非対応のファイル形式の可能性があります。");
      }

      setProgress(10, '解析システムをセットアップ中…');
      
      // Web Audio経由でAudioタグの音声をキャッチする設定
      audioSource = audioCtx.createMediaElementSource(audioHtmlElement);
      analyserNode = audioCtx.createAnalyser();
      analyserNode.fftSize = 256;
      audioSource.connect(analyserNode);
      analyserNode.connect(audioCtx.destination);

      // 超高速ストリーミングによる音量解析の開始
      await analyzeAudioStream();

    } catch (err) {
      console.error(err);
      progressWrap.classList.remove('show');
      fileInfo.innerHTML += '<br><span style="color:var(--accent)">エラーが発生しました: ' + escapeHtml(err.message || String(err)) + '</span>';
    }
  }

  // ---------- Memory-Safe Fast Analysis ----------
  function analyzeAudioStream() {
    return new Promise((resolve) => {
      setProgress(15, '高速音量解析中 (0%)…');
      
      // Androidでの最高倍速（通常は4倍速程度までサポート）を設定して再生
      audioHtmlElement.playbackRate = 4.0; 
      audioHtmlElement.muted = true; // 解析中は消音
      audioHtmlElement.play();

      const bufferLength = analyserNode.frequencyBinCount;
      const dataArray = new Float32Array(bufferLength);
      
      rmsData = [];
      waveformPeaks = [];
      
      // 時間監視用の定期インターバルタイマー
      const intervalMs = (SAMPLING_INTERVAL / audioHtmlElement.playbackRate) * 1000;
      
      const timer = setInterval(() => {
        if (!audioHtmlElement || audioHtmlElement.ended) {
          clearInterval(timer);
          finalizeAnalysis();
          resolve();
          return;
        }

        // リアルタイム波形時間軸からRMS（平方平均二乗誤差＝音量）を算出
        analyserNode.getFloatTimeDomainData(dataArray);
        let sumSq = 0;
        for (let i = 0; i < bufferLength; i++) {
          sumSq += dataArray[i] * dataArray[i];
        }
        const rms = Math.sqrt(sumSq / bufferLength);
        rmsData.push(rms);
        waveformPeaks.push(rms); // 簡易的にRMSをそのまま波形のピークとして採用

        // 進捗率の計算
        const progress = audioHtmlElement.currentTime / duration;
        setProgress(15 + progress * 70, '高速音量解析中 (' + Math.round(progress * 100) + '%)…');
      }, intervalMs);

      audioHtmlElement.onended = () => {
        clearInterval(timer);
        finalizeAnalysis();
        resolve();
      };
    });
  }

  function finalizeAnalysis() {
    setProgress(90, '無音区間を計算中…');
    
    // 解析用に再生状態と速度を等倍に戻す
    audioHtmlElement.playbackRate = 1.0;
    audioHtmlElement.muted = false;
    audioHtmlElement.currentTime = 0;

    // 無音判定
    detectSegments();
    
    setProgress(98, '画面をレンダリング中…');
    setTimeout(() => {
      progressWrap.classList.remove('show');
      renderResult();
    }, 200);
  }

  // ---------- Segment Detection Logic ----------
  function detectSegments() {
    let maxRms = 0;
    for (let i = 0; i < rmsData.length; i++) {
      if (rmsData[i] > maxRms) maxRms = rmsData[i];
    }
    const threshold = maxRms * SILENCE_RATIO;
    // 5分（MIN_SILENCE_SEC）に必要なサンプリング数
    const minSilenceSamples = Math.ceil(MIN_SILENCE_SEC / SAMPLING_INTERVAL);

    const isSilent = new Uint8Array(rmsData.length);
    for (let i = 0; i < rmsData.length; i++) {
      isSilent[i] = rmsData[i] <= threshold ? 1 : 0;
    }

    const rawSegs = [];
    let i = 0;
    while (i < isSilent.length) {
      const startI = i;
      const val = isSilent[i];
      while (i < isSilent.length && isSilent[i] === val) i++;
      const endI = i;
      const lengthSamples = endI - startI;
      const isLongSilence = (val === 1) && (lengthSamples >= minSilenceSamples);
      
      rawSegs.push({
        type: isLongSilence ? 'silence' : 'play',
        startI, endI
      });
    }

    // 隣り合う同タイプのセグメントをマージ
    const merged = [];
    for (const s of rawSegs) {
      if (merged.length && merged[merged.length - 1].type === s.type) {
        merged[merged.length - 1].endI = s.endI;
      } else {
        merged.push({ ...s });
      }
    }

    // 時間軸（秒）に変換
    segments = merged.map(s => ({
      type: s.type,
      start: Math.min(s.startI * SAMPLING_INTERVAL, duration),
      end: Math.min(s.endI * SAMPLING_INTERVAL, duration)
    })).filter(s => s.end - s.start > 0.1);
  }

  // ---------- Rendering UI ----------
  function renderResult() {
    result.classList.add('show');

    const playSegs = segments.filter(s => s.type === 'play');
    const silenceSegs = segments.filter(s => s.type === 'silence');
    const totalSilence = silenceSegs.reduce((a, s) => a + (s.end - s.start), 0);

    resultSummary.innerHTML =
      '全長 <span class="num">' + fmtTime(duration) + '</span>　|　' +
      '演奏区間 <span class="num">' + playSegs.length + '</span>　|　' +
      '無音区間 <span class="num">' + silenceSegs.length + '</span>' +
      (silenceSegs.length ? '（計 ' + fmtTime(totalSilence) + '）' : '');

    drawWaveform();
    drawTimeAxis();
    drawSectionList();
    
    // トランスポートバーの初期化表示
    transport.classList.add('show');
    updateTransportUI();
  }

  function drawWaveform() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    const w = rect.width || canvas.parentElement.clientWidth;
    const h = 120;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);

    const mid = h / 2;

    // 1. 無音区間の背景色を塗る
    ctx.fillStyle = '#e3dfd3';
    segments.filter(s => s.type === 'silence').forEach(s => {
      const x1 = (s.start / duration) * w;
      const x2 = (s.end / duration) * w;
      ctx.fillRect(x1, 0, Math.max(1, x2 - x1), h);
    });

    // 2. 波形ライン（RMS）の描画
    if (waveformPeaks.length > 0) {
      ctx.fillStyle = '#1c1a17';
      const barW = w / waveformPeaks.length;
      // 描画上の最大値で正規化
      let maxPeak = 0.01;
      for(let i=0; i<waveformPeaks.length; i++) { if(waveformPeaks[i] > maxPeak) maxPeak = waveformPeaks[i]; }

      for (let i = 0; i <
